name: Update contributor stats

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Generate contributor stats SVG
        run: |
          go install github.com/hyperfinitism/gh-contrib-stats@latest
          gh-contrib-stats --config .github/gh-contrib-stats.yaml --output assets/contributor-stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Customize card title
        run: |
          sed -i \
            -e "s|Alvin0523's Contribution Stats|GitHub Contributions · Wei Ming|g" \
            -e "s|github-user's Contribution Stats|GitHub Contributions · Wei Ming|g" \
            assets/contributor-stats.svg

      - name: Commit SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/contributor-stats.svg
          git diff --staged --quiet || git commit -m "docs: update contributor stats"
          git push
